<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全新后台管理系统 - 应用服务平台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 重置样式 */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; }
        
        :root {
            --primary: #4a6bff;
            --secondary: #6c5ce7;
            --success: #00b894;
            --danger: #d63031;
            --warning: #fdcb6e;
            --dark: #2d3436;
            --light: #f9f9f9;
            --gray: #636e72;
        }
        
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }
        
        /* 登录页面 */
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-header h1 {
            color: var(--primary);
            font-size: 1.8rem;
            margin-bottom: 10px;
        }
        
        .login-form .form-group {
            margin-bottom: 20px;
        }
        
        .login-form label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--dark);
        }
        
        .login-form input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .login-form input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(74, 107, 255, 0.1);
        }
        
        /* 主后台界面 */
        .admin-wrapper {
            display: none;
        }
        
        /* 侧边栏 */
        .sidebar {
            width: 250px;
            background: linear-gradient(180deg, var(--primary), var(--secondary));
            color: white;
            position: fixed;
            height: 100vh;
            box-shadow: 5px 0 15px rgba(0, 0, 0, 0.1);
        }
        
        .sidebar-header {
            padding: 30px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .sidebar-header h2 {
            font-size: 1.3rem;
        }
        
        .nav-menu {
            list-style: none;
            padding: 20px 0;
        }
        
        .nav-item {
            padding: 15px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .nav-item:hover, .nav-item.active {
            background: rgba(255, 255, 255, 0.1);
            border-left: 4px solid white;
        }
        
        /* 主内容区 */
        .main-content {
            margin-left: 250px;
            padding: 30px;
        }
        
        .page-header {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .page-header h1 {
            color: var(--dark);
        }
        
        /* 管理面板 */
        .admin-panel {
            display: none;
        }
        
        .admin-panel.active {
            display: block;
        }
        
        .panel-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            margin-bottom: 30px;
        }
        
        .panel-title {
            font-size: 1.5rem;
            color: var(--dark);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        /* 表单样式 */
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--dark);
        }
        
        .form-input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        textarea.form-input {
            min-height: 120px;
            resize: vertical;
        }
        
        /* 按钮样式 */
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        
        .btn-primary:hover {
            background: #3a5bff;
            transform: translateY(-2px);
        }
        
        .btn-success {
            background: var(--success);
            color: white;
        }
        
        .btn-success:hover {
            background: #00a085;
        }
        
        .btn-danger {
            background: var(--danger);
            color: white;
        }
        
        .btn-danger:hover {
            background: #c0392b;
        }
        
        /* 链接管理 */
        .links-list {
            margin-top: 20px;
        }
        
        .link-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid var(--primary);
        }
        
        .link-item h4 {
            color: var(--dark);
            margin-bottom: 10px;
        }
        
        /* 数据表格 */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        .data-table th, .data-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .data-table th {
            background: #f8f9fa;
            font-weight: 600;
            color: var(--dark);
        }
        
        .data-table tr:hover {
            background: #f8f9fa;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
            }
            
            .main-content {
                margin-left: 0;
            }
            
            .panel-card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- 登录页面 -->
    <div id="login-page" class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <h1><i class="fas fa-lock"></i> 后台登录</h1>
                <p>管理员请登录</p>
            </div>
            
            <form id="login-form" class="login-form">
                <div class="form-group">
                    <label for="login-username">用户名</label>
                    <input type="text" id="login-username" placeholder="管理员" required>
                </div>
                
                <div class="form-group">
                    <label for="login-password">密码</label>
                    <input type="password" id="login-password" placeholder="管理员密码" required>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    <i class="fas fa-sign-in-alt"></i> 登录
                </button>
            </form>
        </div>
    </div>
    
    <!-- 后台主界面 -->
    <div id="admin-page" class="admin-wrapper">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-cogs"></i> 后台管理</h2>
            </div>
            <ul class="nav-menu">
                <li class="nav-item active" data-panel="dashboard">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>仪表板</span>
                </li>
                <li class="nav-item" data-panel="announcement">
                    <i class="fas fa-bullhorn"></i>
                    <span>公告管理</span>
                </li>
                <li class="nav-item" data-panel="links">
                    <i class="fas fa-link"></i>
                    <span>链接管理</span>
                </li>
                <li class="nav-item" data-panel="settings">
                    <i class="fas fa-cog"></i>
                    <span>系统设置</span>
                </li>
                <li class="nav-item" id="logout-btn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>退出登录</span>
                </li>
            </ul>
        </div>
        
        <!-- 主内容区 -->
        <div class="main-content">
            <!-- 页面头部 -->
            <div class="page-header">
                <h1 id="page-title">仪表板</h1>
            </div>
            
            <!-- 仪表板 -->
            <div id="dashboard-panel" class="admin-panel active">
                <div class="panel-card">
                    <h2 class="panel-title"><i class="fas fa-tachometer-alt"></i> 系统概览</h2>
                    <p>欢迎使用后台管理系统！这里您可以管理网站的所有内容。</p>
                    
                    <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 30px;">
                        <div style="background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 20px; border-radius: 10px;">
                            <h3 style="margin-bottom: 10px;">总链接数</h3>
                            <p style="font-size: 2rem; font-weight: 700;" id="total-links">5</p>
                        </div>
                        <div style="background: linear-gradient(135deg, #f093fb, #f5576c); color: white; padding: 20px; border-radius: 10px;">
                            <h3 style="margin-bottom: 10px;">总点击量</h3>
                            <p style="font-size: 2rem; font-weight: 700;" id="total-clicks">0</p>
                        </div>
                        <div style="background: linear-gradient(135deg, #4facfe, #00f2fe); color: white; padding: 20px; border-radius: 10px;">
                            <h3 style="margin-bottom: 10px;">系统状态</h3>
                            <p style="font-size: 2rem; font-weight: 700;">正常</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 公告管理 -->
            <div id="announcement-panel" class="admin-panel">
                <div class="panel-card">
                    <h2 class="panel-title"><i class="fas fa-bullhorn"></i> 公告管理</h2>
                    <p>管理网站首页显示的公告内容</p>
                    
                    <div class="form-group" style="margin-top: 20px;">
                        <label class="form-label">公告标题</label>
                        <input type="text" id="announcement-title" class="form-input" placeholder="请输入公告标题">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">公告内容</label>
                        <textarea id="announcement-content" class="form-input" placeholder="请输入公告内容..."></textarea>
                    </div>
                    
                    <button id="save-announcement" class="btn btn-primary">
                        <i class="fas fa-save"></i> 保存公告
                    </button>
                    
                    <div id="announcement-status" style="margin-top: 15px; padding: 10px; border-radius: 5px; display: none;"></div>
                </div>
            </div>
            
            <!-- 链接管理 -->
            <div id="links-panel" class="admin-panel">
                <div class="panel-card">
                    <h2 class="panel-title"><i class="fas fa-link"></i> 链接管理</h2>
                    <p>管理首页的快速访问链接，可修改名称、描述、链接地址等</p>
                    
                    <div id="links-container" class="links-list">
                        <!-- 链接将在这里动态生成 -->
                    </div>
                    
                    <button id="save-links" class="btn btn-primary">
                        <i class="fas fa-save"></i> 保存所有链接
                    </button>
                    
                    <div id="links-status" style="margin-top: 15px; padding: 10px; border-radius: 5px; display: none;"></div>
                </div>
            </div>
            
            <!-- 系统设置 -->
            <div id="settings-panel" class="admin-panel">
                <div class="panel-card">
                    <h2 class="panel-title"><i class="fas fa-cog"></i> 系统设置</h2>
                    <p>配置系统的基本参数</p>
                    
                    <div class="form-group">
                        <label class="form-label">系统名称</label>
                        <input type="text" id="system-name" class="form-input" placeholder="应用服务平台">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">维护时间</label>
                        <input type="text" id="maintenance-time" class="form-input" placeholder="每周日凌晨 2:00-4:00">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">版本号</label>
                        <input type="text" id="system-version" class="form-input" placeholder="v2.0.0">
                    </div>
                    
                    <button id="save-settings" class="btn btn-primary">
                        <i class="fas fa-save"></i> 保存设置
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 全新后台管理系统
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化系统
            initSystem();
        });

        // 初始化系统
        function initSystem() {
            // 检查登录状态
            checkLoginStatus();
            
            // 初始化事件监听
            initEventListeners();
            
            // 加载初始数据
            loadInitialData();
        }

        // 检查登录状态
        function checkLoginStatus() {
            const isLoggedIn = localStorage.getItem('adminLoggedIn') === 'true';
            if (isLoggedIn) {
                showAdminPage();
            } else {
                showLoginPage();
            }
        }

        // 显示登录页面
        function showLoginPage() {
            document.getElementById('login-page').style.display = 'flex';
            document.getElementById('admin-page').style.display = 'none';
        }

        // 显示后台页面
        function showAdminPage() {
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('admin-page').style.display = 'block';
            
            // 加载数据
            loadAdminData();
        }

        // 初始化事件监听
        function initEventListeners() {
            // 登录表单
            document.getElementById('login-form').addEventListener('submit', function(e) {
                e.preventDefault();
                handleLogin();
            });

            // 导航菜单
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', function() {
                    if (this.dataset.panel) {
                        // 切换导航项
                        document.querySelectorAll('.nav-item').forEach(nav => {
                            nav.classList.remove('active');
                        });
                        this.classList.add('active');
                        
                        // 切换面板
                        switchPanel(this.dataset.panel);
                    } else if (this.id === 'logout-btn') {
                        logout();
                    }
                });
            });

            // 保存公告
            document.getElementById('save-announcement').addEventListener('click', saveAnnouncement);
            
            // 保存链接
            document.getElementById('save-links').addEventListener('click', saveLinks);
            
            // 保存设置
            document.getElementById('save-settings').addEventListener('click', saveSettings);
        }

        // 登录处理
        function handleLogin() {
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            
            // 简单的验证
            if (username === 'admin' && password === 'admin123') {
                localStorage.setItem('adminLoggedIn', 'true');
                showAdminPage();
            } else {
                alert('用户名或密码错误！');
            }
        }

        // 登出
        function logout() {
            if (confirm('确定要退出登录吗？')) {
                localStorage.removeItem('adminLoggedIn');
                showLoginPage();
            }
        }

        // 切换面板
        function switchPanel(panelName) {
            // 隐藏所有面板
            document.querySelectorAll('.admin-panel').forEach(panel => {
                panel.classList.remove('active');
            });
            
            // 显示目标面板
            document.getElementById(`${panelName}-panel`).classList.add('active');
            
            // 更新页面标题
            const titles = {
                'dashboard': '仪表板',
                'announcement': '公告管理',
                'links': '链接管理',
                'settings': '系统设置'
            };
            
            if (titles[panelName]) {
                document.getElementById('page-title').textContent = titles[panelName];
            }
            
            // 如果是链接面板，加载链接数据
            if (panelName === 'links') {
                loadLinksData();
            }
        }

        // 加载初始数据
        function loadInitialData() {
            // 加载默认链接
            loadDefaultLinks();
        }

        // 加载后台数据
        function loadAdminData() {
            // 加载公告
            loadAnnouncementData();
            
            // 加载系统设置
            loadSettingsData();
        }

        // 加载公告数据
        function loadAnnouncementData() {
            try {
                const appData = getAppData();
                if (appData.announcement) {
                    document.getElementById('announcement-content').value = appData.announcement.content || '';
                    document.getElementById('announcement-title').value = appData.announcement.title || '系统公告';
                }
            } catch (error) {
                console.error('加载公告失败:', error);
            }
        }

        // 加载链接数据
        function loadLinksData() {
            const container = document.getElementById('links-container');
            container.innerHTML = '';
            
            try {
                const appData = getAppData();
                const links = appData.links || [];
                
                if (links.length === 0) {
                    // 如果没有链接，使用默认链接
                    loadDefaultLinks();
                    return;
                }
                
                // 生成链接表单
                links.forEach(link => {
                    const linkForm = createLinkForm(link);
                    container.appendChild(linkForm);
                });
                
            } catch (error) {
                console.error('加载链接失败:', error);
                loadDefaultLinks();
            }
        }

        // 创建链接表单
        function createLinkForm(link) {
            const form = document.createElement('div');
            form.className = 'link-item';
            form.dataset.id = link.id || generateId();
            
            form.innerHTML = `
                <h4>链接 ${link.id || '新'}</h4>
                <div class="form-group">
                    <label class="form-label">链接名称</label>
                    <input type="text" class="form-input link-title" 
                           value="${link.title || ''}" 
                           placeholder="请输入链接名称"
                           data-field="title">
                </div>
                <div class="form-group">
                    <label class="form-label">链接描述</label>
                    <input type="text" class="form-input link-desc" 
                           value="${link.description || ''}" 
                           placeholder="请输入链接描述"
                           data-field="description">
                </div>
                <div class="form-group">
                    <label class="form-label">链接地址 (URL)</label>
                    <input type="text" class="form-input link-url" 
                           value="${link.url || ''}" 
                           placeholder="https://example.com"
                           data-field="url">
                </div>
                <div class="form-group">
                    <label class="form-label">图标颜色</label>
                    <input type="color" class="form-input link-color" 
                           value="${link.color || '#4a6bff'}" 
                           style="width: 60px; height: 40px;"
                           data-field="color">
                </div>
                <div style="font-size: 0.9rem; color: #666; margin-top: 5px; background: #f0f0f0; padding: 8px; border-radius: 4px;">
                    当前值: 名称="${link.title || '无'}" | URL="${link.url || '无'}"
                </div>
            `;
            
            return form;
        }

        // 加载默认链接
        function loadDefaultLinks() {
            const container = document.getElementById('links-container');
            container.innerHTML = '';
            
            const defaultLinks = [
                { id: 1, title: "应用下载中心", description: "获取最新应用和工具", 
                  url: "https://example.com/download", color: "#4a6bff" },
                { id: 2, title: "服务控制台", description: "管理服务配置", 
                  url: "https://example.com/console", color: "#00b894" },
                { id: 3, title: "用户中心", description: "查看个人信息", 
                  url: "https://example.com/user", color: "#fdcb6e" },
                { id: 4, title: "数据分析", description: "查看使用数据", 
                  url: "https://example.com/analytics", color: "#e17055" },
                { id: 5, title: "技术支持", description: "获取帮助文档", 
                  url: "https://example.com/support", color: "#6c5ce7" }
            ];
            
            defaultLinks.forEach(link => {
                const linkForm = createLinkForm(link);
                container.appendChild(linkForm);
            });
        }

        // 加载设置数据
        function loadSettingsData() {
            try {
                const appData = getAppData();
                if (appData.settings) {
                    document.getElementById('system-name').value = appData.settings.name || '应用服务平台';
                    document.getElementById('maintenance-time').value = appData.settings.maintenanceTime || '每周日凌晨 2:00-4:00';
                    document.getElementById('system-version').value = appData.settings.version || 'v2.0.0';
                }
            } catch (error) {
                console.error('加载设置失败:', error);
            }
        }

        // 保存公告
        function saveAnnouncement() {
            const title = document.getElementById('announcement-title').value.trim();
            const content = document.getElementById('announcement-content').value.trim();
            const statusDiv = document.getElementById('announcement-status');
            
            if (!content) {
                showStatus(statusDiv, '公告内容不能为空！', 'error');
                return;
            }
            
            try {
                const appData = getAppData();
                appData.announcement = {
                    title: title || '系统公告',
                    content: content,
                    updatedAt: new Date().toISOString()
                };
                
                saveAppData(appData);
                showStatus(statusDiv, '公告保存成功！', 'success');
                
            } catch (error) {
                console.error('保存公告失败:', error);
                showStatus(statusDiv, '保存失败: ' + error.message, 'error');
            }
        }

        // 保存链接
        function saveLinks() {
            const container = document.getElementById('links-container');
            const statusDiv = document.getElementById('links-status');
            const linkItems = container.querySelectorAll('.link-item');
            
            const links = [];
            let hasError = false;
            
            // 收集所有链接数据
            linkItems.forEach((item, index) => {
                const title = item.querySelector('.link-title').value.trim();
                const description = item.querySelector('.link-desc').value.trim();
                const url = item.querySelector('.link-url').value.trim();
                const color = item.querySelector('.link-color').value;
                const id = item.dataset.id || (index + 1);
                
                // 验证必填字段
                if (!title) {
                    showStatus(statusDiv, `链接${index + 1}的名称不能为空！`, 'error');
                    item.querySelector('.link-title').focus();
                    hasError = true;
                    return;
                }
                
                if (!url) {
                    showStatus(statusDiv, `链接${index + 1}的URL地址不能为空！`, 'error');
                    item.querySelector('.link-url').focus();
                    hasError = true;
                    return;
                }
                
                // 验证URL格式
                if (!isValidUrl(url) && !url.startsWith('/')) {
                    if (!confirm(`链接"${title}"的URL "${url}" 格式可能不正确，是否继续？`)) {
                        item.querySelector('.link-url').focus();
                        hasError = true;
                        return;
                    }
                }
                
                links.push({
                    id: parseInt(id),
                    title: title,
                    description: description,
                    url: url,
                    color: color,
                    clicks: 0,
                    lastClick: null
                });
            });
            
            if (hasError) return;
            
            try {
                const appData = getAppData();
                appData.links = links;
                
                saveAppData(appData);
                showStatus(statusDiv, '链接保存成功！', 'success');
                
                // 刷新显示
                setTimeout(() => {
                    loadLinksData();
                }, 1000);
                
            } catch (error) {
                console.error('保存链接失败:', error);
                showStatus(statusDiv, '保存失败: ' + error.message, 'error');
            }
        }

        // 保存设置
        function saveSettings() {
            const name = document.getElementById('system-name').value.trim();
            const maintenanceTime = document.getElementById('maintenance-time').value.trim();
            const version = document.getElementById('system-version').value.trim();
            
            if (!name || !maintenanceTime || !version) {
                alert('所有设置项都不能为空！');
                return;
            }
            
            try {
                const appData = getAppData();
                appData.settings = {
                    name: name,
                    maintenanceTime: maintenanceTime,
                    version: version,
                    updatedAt: new Date().toISOString()
                };
                
                saveAppData(appData);
                alert('系统设置保存成功！');
                
            } catch (error) {
                console.error('保存设置失败:', error);
                alert('保存失败: ' + error.message);
            }
        }

        // 获取应用数据
        function getAppData() {
            const savedData = localStorage.getItem('appServicePlatformData');
            if (savedData) {
                return JSON.parse(savedData);
            }
            return {};
        }

        // 保存应用数据
        function saveAppData(data) {
            localStorage.setItem('appServicePlatformData', JSON.stringify(data));
        }

        // 生成ID
        function generateId() {
            return Date.now();
        }

        // 验证URL
        function isValidUrl(string) {
            try {
                new URL(string);
                return true;
            } catch (_) {
                return false;
            }
        }

        // 显示状态
        function showStatus(element, message, type) {
            element.textContent = message;
            element.style.display = 'block';
            element.style.background = type === 'success' ? '#d4edda' : '#f8d7da';
            element.style.color = type === 'success' ? '#155724' : '#721c24';
            element.style.border = '1px solid ' + (type === 'success' ? '#c3e6cb' : '#f5c6cb');
            
            setTimeout(() => {
                element.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
