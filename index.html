<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XI项目服务平台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        
        :root {
            --primary-color: #4a6bff;
            --secondary-color: #6c5ce7;
            --success-color: #00b894;
            --danger-color: #d63031;
            --warning-color: #fdcb6e;
            --dark-color: #2d3436;
            --light-color: #f9f9f9;
            --gray-color: #636e72;
        }
        
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            color: #333;
        }
        
        /* 导航栏 */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background-color: white;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        .logo {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo i {
            color: var(--secondary-color);
        }
        
        .nav-buttons {
            display: flex;
            gap: 20px;
        }
        
        .nav-button {
            background: none;
            border: none;
            padding: 10px 20px;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--dark-color);
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .nav-button:hover {
            background-color: var(--primary-color);
            color: white;
            transform: translateY(-2px);
        }
        
        .nav-button.active {
            background-color: var(--primary-color);
            color: white;
        }
        
        /* 公告栏 */
        .announcement-bar {
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 15px 40px;
            margin: 20px 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .announcement-icon {
            font-size: 1.5rem;
        }
        
        .announcement-content {
            flex: 1;
        }
        
        /* 主内容区 */
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 40px;
        }
        
        .content-wrapper {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }
        
        /* 快速访问链接 */
        .quick-access {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }
        
        .section-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 25px;
            color: var(--dark-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .quick-access-links {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }
        
        .link-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            gap: 20px;
            position: relative;
            overflow: hidden;
        }
        
        .link-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
            border-color: var(--primary-color);
        }
        
        .link-card:active {
            transform: translateY(-3px) scale(0.99);
        }
        
        .link-icon {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            flex-shrink: 0;
        }
        
        .link-content {
            flex: 1;
        }
        
        .link-content h3 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--dark-color);
        }
        
        .link-content p {
            color: var(--gray-color);
            line-height: 1.5;
            font-size: 0.95rem;
        }
        
        .link-arrow {
            color: var(--gray-color);
            font-size: 1.2rem;
            transition: transform 0.3s ease;
        }
        
        .link-card:hover .link-arrow {
            transform: translateX(5px);
            color: var(--primary-color);
        }
        
        /* 用户数据面板 */
        .data-panel {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }
        
        .data-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            margin-bottom: 15px;
            background: #f8f9fa;
            border-radius: 12px;
            border-left: 4px solid var(--primary-color);
        }
        
        .data-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-color);
        }
        
        /* 功能按钮 */
        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .action-button {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
        }
        
        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }
        
        .btn-primary:hover {
            background-color: #3a5bff;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(74, 107, 255, 0.3);
        }
        
        .btn-success {
            background-color: var(--success-color);
            color: white;
        }
        
        .btn-success:hover {
            background-color: #00a085;
            transform: translateY(-2px);
        }
        
        .btn-warning {
            background-color: var(--warning-color);
            color: var(--dark-color);
        }
        
        .btn-warning:hover {
            background-color: #f7b95a;
            transform: translateY(-2px);
        }
        
        .btn-danger {
            background-color: var(--danger-color);
            color: white;
        }
        
        .btn-danger:hover {
            background-color: #c0392b;
            transform: translateY(-2px);
        }
        
        /* 底部信息 */
        .footer {
            margin-top: 40px;
            padding: 30px 40px;
            background: white;
            border-radius: 20px 20px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--gray-color);
        }
        
        .version-info {
            text-align: right;
        }
        
        .version {
            font-weight: 600;
            color: var(--primary-color);
        }
        
        .maintenance-time {
            font-weight: 600;
            color: var(--dark-color);
        }
        
        /* 点击动画 */
        @keyframes clickAnimation {
            0% { transform: scale(1); }
            50% { transform: scale(0.95); }
            100% { transform: scale(1); }
        }
        
        .clicked {
            animation: clickAnimation 0.3s ease;
        }
        
        /* 响应式设计 */
        @media (max-width: 1200px) {
            .content-wrapper {
                grid-template-columns: 1fr;
            }
        }
        
        @media (max-width: 768px) {
            .navbar, .announcement-bar, .main-container, .footer {
                padding: 15px 20px;
            }
            
            .quick-access-links {
                grid-template-columns: 1fr;
            }
            
            .nav-buttons {
                display: none;
            }
            
            .action-buttons {
                justify-content: center;
            }
            
            .footer {
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="logo">
            <i class="fas fa-rocket"></i>
            <span>应用服务平台</span>
        </div>
        <div class="nav-buttons">
            <button class="nav-button active">
                <i class="fas fa-home"></i>
                <span>首页</span>
            </button>
            <button class="nav-button">
                <i class="fas fa-th-large"></i>
                <span>服务</span>
            </button>
            <button class="nav-button">
                <i class="fas fa-info-circle"></i>
                <span>关于</span>
            </button>
            <button class="nav-button">
                <i class="fas fa-headset"></i>
                <span>支持</span>
            </button>
        </div>
    </nav>
    
    <!-- 公告栏 -->
    <div class="announcement-bar">
        <div class="announcement-icon">
            <i class="fas fa-bullhorn"></i>
        </div>
        <div class="announcement-content">
            <h3 id="announcement-title">系统公告</h3>
            <p id="announcement-text">欢迎使用应用服务平台！系统运行稳定，所有功能均可正常使用。</p>
        </div>
    </div>
    
    <!-- 主内容区 -->
    <div class="main-container">
        <div class="content-wrapper">
            <!-- 快速访问链接区域 -->
            <div class="quick-access">
                <h2 class="section-title">
                    <i class="fas fa-external-link-alt"></i> 快速访问
                </h2>
                
                <div class="quick-access-links" id="links-container">
                    <!-- 链接卡片将通过JavaScript动态生成 -->
                </div>
                
                <!-- 功能按钮区域 -->
                <div class="action-buttons">
                    <button class="action-button btn-primary" id="adminButton">
                        <i class="fas fa-cog"></i>
                        后台管理
                    </button>
                    <button class="action-button btn-success" id="refreshButton">
                        <i class="fas fa-redo"></i>
                        刷新数据
                    </button>
                    <button class="action-button btn-warning" id="exportButton">
                        <i class="fas fa-download"></i>
                        导出数据
                    </button>
                    <button class="action-button btn-danger" id="logoutButton">
                        <i class="fas fa-sign-out-alt"></i>
                        退出登录
                    </button>
                </div>
            </div>
            
            <!-- 用户数据面板 -->
            <div class="data-panel">
                <h2 class="section-title">
                    <i class="fas fa-chart-bar"></i> 用户数据面板
                </h2>
                
                <div class="data-item">
                    <span>今日总点击量</span>
                    <span class="data-value" id="todayClicks">0</span>
                </div>
                
                <div class="data-item">
                    <span>总点击量</span>
                    <span class="data-value" id="totalClicks">0</span>
                </div>
                
                <div class="data-item">
                    <span>今日访问次数</span>
                    <span class="data-value" id="todayVisits">0</span>
                </div>
                
                <div class="data-item">
                    <span>最受欢迎链接</span>
                    <span class="data-value" id="popularLink">-</span>
                </div>
                
                <div class="data-item">
                    <span>平均响应时间</span>
                    <span class="data-value" id="avgResponseTime">0ms</span>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 底部信息 -->
    <footer class="footer">
        <div class="system-info">
            <p>系统维护时间: <span class="maintenance-time" id="maintenanceTime">每周日凌晨 2:00-4:00</span></p>
            <p>技术支持TG：JUFENYS
            TG：@XIYDS</p>
        </div>
        <div class="version-info">
            <p>网页版本号: <span class="version" id="versionNumber">v2.1.5</span></p>
            <p>© 2026 XI项目服务平台 版权所有</p>
        </div>
    </footer>

    <script>
        // 应用数据
        const appData = {
            links: [],
            totalClicks: 0,
            todayClicks: 0,
            todayVisits: 0,
            lastVisit: null,
            clickHistory: [],
            announcement: "欢迎使用应用服务平台！系统运行稳定，所有功能均可正常使用。最新版本已上线，带来更流畅的使用体验。",
            maintenanceTime: "每周日凌晨 00:00-3:00",
            version: "v1.0.1"
        };

        // 默认链接数据
        const defaultLinks = [
            {
                id: 1,
                title: "应用下载中心",
                description: "获取最新版本的应用和工具，支持多平台下载",
                icon: "fas fa-download",
                url: "https://example.com/download",
                color: "#4a6bff",
                clicks: 0,
                lastClick: null
            },
            {
                id: 2,
                title: "服务控制台",
                description: "管理您的服务配置和监控运行状态",
                icon: "fas fa-cogs",
                url: "https://example.com/console",
                color: "#00b894",
                clicks: 0,
                lastClick: null
            },
            {
                id: 3,
                title: "用户中心",
                description: "查看个人信息、权限设置和账号安全",
                icon: "fas fa-user-circle",
                url: "https://example.com/user",
                color: "#fdcb6e",
                clicks: 0,
                lastClick: null
            },
            {
                id: 4,
                title: "数据分析",
                description: "查看平台使用数据和分析报告",
                icon: "fas fa-chart-bar",
                url: "https://example.com/analytics",
                color: "#e17055",
                clicks: 0,
                lastClick: null
            },
            {
                id: 5,
                title: "技术支持",
                description: "获取帮助文档、联系客服和技术支持",
                icon: "fas fa-headset",
                url: "https://example.com/support",
                color: "#6c5ce7",
                clicks: 0,
                lastClick: null
            }
        ];

        // 初始化应用
        document.addEventListener('DOMContentLoaded', function() {
            initApp();
        });

        // 初始化应用
        function initApp() {
            loadAppData();
            initLinks();
            initEventListeners();
            updateDataPanel();
            
            // 更新今日访问量
            updateTodayVisits();
        }

        // 从localStorage加载数据
        function loadAppData() {
            const savedData = localStorage.getItem('appServicePlatformData');
            if (savedData) {
                try {
                    const parsedData = JSON.parse(savedData);
                    Object.assign(appData, parsedData);
                } catch (e) {
                    console.error('加载数据失败:', e);
                }
            }
            
            // 如果links为空，使用默认数据
            if (!appData.links || appData.links.length === 0) {
                appData.links = [...defaultLinks];
            }
            
            // 更新页面显示
            document.getElementById('announcement-text').textContent = appData.announcement;
            document.getElementById('maintenanceTime').textContent = appData.maintenanceTime;
            document.getElementById('versionNumber').textContent = appData.version;
        }

        // 保存数据到localStorage
        function saveAppData() {
            try {
                localStorage.setItem('appServicePlatformData', JSON.stringify(appData));
            } catch (e) {
                console.error('保存数据失败:', e);
            }
        }

        // 初始化链接
        function initLinks() {
            const linksContainer = document.getElementById('links-container');
            linksContainer.innerHTML = '';
            
            appData.links.forEach(link => {
                const linkCard = document.createElement('div');
                linkCard.className = 'link-card';
                linkCard.dataset.id = link.id;
                
                linkCard.innerHTML = `
                    <div class="link-icon" style="color: ${link.color};">
                        <i class="${link.icon}"></i>
                    </div>
                    <div class="link-content">
                        <h3>${link.title}</h3>
                        <p>${link.description}</p>
                    </div>
                    <div class="link-arrow">
                        <i class="fas fa-arrow-right"></i>
                    </div>
                `;
                
                // 添加点击事件
                linkCard.addEventListener('click', function() {
                    handleLinkClick(link);
                });
                
                linksContainer.appendChild(linkCard);
            });
        }

        // 处理链接点击
        function handleLinkClick(link) {
            const startTime = performance.now();
            
            // 添加点击动画
            const card = document.querySelector(`.link-card[data-id="${link.id}"]`);
            if (card) {
                card.classList.add('clicked');
                setTimeout(() => {
                    card.classList.remove('clicked');
                }, 300);
            }
            
            // 更新统计
            link.clicks = (link.clicks || 0) + 1;
            appData.totalClicks++;
            appData.todayClicks++;
            
            // 记录最后点击时间
            link.lastClick = new Date().toISOString();
            
            // 记录点击历史
            if (!appData.clickHistory) appData.clickHistory = [];
            const clickRecord = {
                linkId: link.id,
                linkTitle: link.title,
                timestamp: new Date().toISOString(),
                responseTime: 0
            };
            
            // 计算响应时间
            const responseTime = performance.now() - startTime;
            clickRecord.responseTime = responseTime;
            appData.clickHistory.push(clickRecord);
            
            // 更新数据面板
            updateDataPanel();
            
            // 保存数据
            saveAppData();
            
            // 实际跳转到链接
            setTimeout(() => {
                if (link.url && link.url.trim()) {
                    window.open(link.url, '_blank');
                    console.log(`已跳转到: ${link.title} (${link.url})`);
                } else {
                    alert('链接地址未设置');
                }
            }, 50);
        }

        // 更新今日访问量
        function updateTodayVisits() {
            const today = new Date().toDateString();
            if (appData.lastVisit !== today) {
                appData.todayVisits = 0;
                appData.todayClicks = 0;
            }
            appData.todayVisits++;
            appData.lastVisit = today;
            saveAppData();
        }

        // 更新数据面板
        function updateDataPanel() {
            document.getElementById('todayClicks').textContent = appData.todayClicks;
            document.getElementById('totalClicks').textContent = appData.totalClicks;
            document.getElementById('todayVisits').textContent = appData.todayVisits;
            
            // 计算最受欢迎链接
            let popularLink = '-';
            let maxClicks = 0;
            appData.links.forEach(link => {
                if (link.clicks > maxClicks) {
                    maxClicks = link.clicks;
                    popularLink = link.title;
                }
            });
            document.getElementById('popularLink').textContent = popularLink;
            
            // 计算平均响应时间
            let avgResponseTime = 0;
            if (appData.clickHistory && appData.clickHistory.length > 0) {
                const totalResponseTime = appData.clickHistory.reduce((sum, record) => sum + (record.responseTime || 0), 0);
                avgResponseTime = totalResponseTime / appData.clickHistory.length;
            }
            document.getElementById('avgResponseTime').textContent = avgResponseTime.toFixed(0) + 'ms';
        }

        // 初始化事件监听器
        function initEventListeners() {
            // 导航按钮
            document.querySelectorAll('.nav-button').forEach(button => {
                button.addEventListener('click', function() {
                    // 移除所有active类
                    document.querySelectorAll('.nav-button').forEach(btn => {
                        btn.classList.remove('active');
                    });
                    // 添加当前按钮active类
                    this.classList.add('active');
                    
                    // 处理导航
                    const buttonText = this.querySelector('span').textContent;
                    handleNavigation(buttonText);
                });
            });
            
            // 后台管理按钮
            document.getElementById('adminButton').addEventListener('click', function() {
                alert('后台管理功能正在开发中，即将开放！');
            });
            
            // 刷新按钮
            document.getElementById('refreshButton').addEventListener('click', function() {
                location.reload();
            });
            
            // 导出按钮
            document.getElementById('exportButton').addEventListener('click', function() {
                exportData();
            });
            
            // 退出登录按钮
            document.getElementById('logoutButton').addEventListener('click', function() {
                if (confirm('确定要退出登录吗？')) {
                    localStorage.removeItem('appServicePlatformData');
                    location.reload();
                }
            });
        }

        // 处理导航
        function handleNavigation(page) {
            console.log(`导航到: ${page}`);
            // 这里可以添加页面切换逻辑
        }

        // 导出数据
        function exportData() {
            const exportData = {
                exportTime: new Date().toISOString(),
                summary: {
                    totalClicks: appData.totalClicks,
                    todayClicks: appData.todayClicks,
                    todayVisits: appData.todayVisits
                },
                links: appData.links,
                clickHistory: appData.clickHistory
            };
            
            const dataStr = JSON.stringify(exportData, null, 2);
            const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr);
            
            const exportFileDefaultName = `应用平台数据_${new Date().toISOString().slice(0, 10)}.json`;
            
            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', exportFileDefaultName);
            linkElement.click();
            
            alert('数据导出成功！');
        }
    </script>
</body>
</html>
